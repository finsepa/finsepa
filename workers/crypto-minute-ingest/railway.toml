# Config for the finsepa-crypto-minute-ingest service (BTC crypto WS → Supabase).
# Deploy with this directory as the upload/build context:
#   railway up workers/crypto-minute-ingest --service finsepa-crypto-minute-ingest
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 120
numReplicas = 1
