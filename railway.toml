# Railway worker: stock minute ingest (finsepa-stock-minute-ingest project).
# Vercel ignores this file — deploy with: railway up
[build]
builder = "DOCKERFILE"
dockerfilePath = "workers/stock-minute-ingest/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 120
numReplicas = 1
