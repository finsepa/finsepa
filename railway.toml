# Railway config for finsepa-stock-minute-ingest worker (Docker build from repo root).
# Project: finsepa-stock-minute-ingest — not used by Vercel deploys.
[build]
builder = "DOCKERFILE"
dockerfilePath = "workers/stock-minute-ingest/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 120
numReplicas = 1
